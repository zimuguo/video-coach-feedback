appId: com.videocoaching.teacher
productName: Video Coaching Feedback - Teacher
directories:
  output: dist-installers
files:
  - out/**/*
  - "!**/.vscode/**"
  - "!src/**"
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns
  category: public.app-category.education
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
