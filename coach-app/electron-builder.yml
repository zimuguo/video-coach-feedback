appId: com.videocoaching.coach
productName: Video Coaching Feedback - Coach
directories:
  output: dist-installers
files:
  - out/**/*
  - "!**/.vscode/**"
  - "!src/**"
win:
  target:
    - target: portable
      arch: [x64]
  icon: resources/icon.ico
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns
  category: public.app-category.education
