name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.app_label }}
    strategy:
      matrix:
        include:
          - app: coach-app
            app_label: Coach
          - app: teacher-app
            app_label: Teacher
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version from tag
        working-directory: ${{ matrix.app }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm install

      - name: Build (Vite)
        working-directory: ${{ matrix.app }}
        run: npm run build

      - name: Package Mac (DMG + .app)
        working-directory: ${{ matrix.app }}
        run: npx electron-builder

      - name: Package Windows (portable exe)
        working-directory: ${{ matrix.app }}
        run: npx electron-builder --win

      - name: Rename .app bundles
        working-directory: ${{ matrix.app }}
        run: node scripts/rename-apps.js

      - name: Zip .app bundles
        working-directory: ${{ matrix.app }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APP="Video Coaching Feedback - ${{ matrix.app_label }}"
          cd dist-installers/mac
          zip -r "../${APP}-${VERSION}.app.zip" "${APP}-${VERSION}.app"
          cd ../mac-arm64
          zip -r "../${APP}-${VERSION}-arm64.app.zip" "${APP}-${VERSION}-arm64.app"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: |
            ${{ matrix.app }}/dist-installers/*.dmg
            ${{ matrix.app }}/dist-installers/*.exe
            ${{ matrix.app }}/dist-installers/*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          body_path: DISTRIBUTION.md
